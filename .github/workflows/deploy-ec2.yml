name: Deploy LumaBot to EC2

on:
  push:
    branches: [monteiro/bulma-ec2]
    paths-ignore:
      - 'docs/**'
      - 'tests/**'
      - 'infra/**'
      - '*.md'
      - '.gitignore'
      - '.dockerignore'

env:
  AWS_REGION: us-east-2
  GHCR_IMAGE: ghcr.io/${{ github.repository }}/luma-bot

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.ec2.outputs.instance_id }}
      public_ip: ${{ steps.ec2.outputs.public_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013459781186:role/LumaBotGHActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform state
        uses: actions/cache@v4
        with:
          path: infra/*.tfstate*
          key: terraform-state-${{ hashFiles('infra/**/*.tf') }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="deepseek_api_key=${{ secrets.DEEPSEEK_API_KEY }}" \
            -var="tavily_api_key=${{ secrets.TAVILY_API_KEY }}" \
            -var="owner_number=${{ secrets.OWNER_NUMBER }}" \
            -var="dashboard_password=${{ secrets.DASHBOARD_PASSWORD }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Get EC2 outputs
        id: ec2
        working-directory: infra
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build & Deploy
    needs: terraform
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013459781186:role/LumaBotGHActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.GHCR_IMAGE }}:latest,${{ env.GHCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via AWS SSM
        env:
          INSTANCE_ID: ${{ needs.terraform.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "cd /app",
              "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "sleep 10",
              "curl -sf http://localhost:3000/health && echo \"\\n✅ Health check passed\" || echo \"\\n⚠️ Health check failed\""
            ]}' \
            --comment "Deploy LumaBot ${{ github.sha }}" \
            --output text \
            --query 'Command.CommandId')
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

          # Aguarda conclusão
          sleep 20
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "::warning::SSM command finished with status: $STATUS"
          fi

  healthcheck:
    name: Health Check
    needs: [terraform, build-and-deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013459781186:role/LumaBotGHActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Check application health
        env:
          INSTANCE_ID: ${{ needs.terraform.outputs.instance_id }}
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "Checking http://$IP/health ..."
          curl -sf "http://$IP/health" && echo "✅ LumaBot is healthy!" || echo "⚠️ Health check failed - check logs"
