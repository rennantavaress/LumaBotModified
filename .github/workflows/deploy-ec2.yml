name: Deploy BulmaBot to EC2

on:
  push:
    branches: [monteiro/bulma-ec2]
    paths-ignore:
      - 'docs/**'
      - 'tests/**'
      - 'infra/**'
      - '*.md'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  GHCR_IMAGE: ghcr.io/${{ github.repository }}/bulma-bot
  EC2_TAG_NAME: luma-bot-production

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013459781186:role/LumaBotGHActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.EC2_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running EC2 instance found with tag ${{ env.EC2_TAG_NAME }}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.GHCR_IMAGE }}:latest,${{ env.GHCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via AWS SSM
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "cd /app",
              "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "sleep 10",
              "curl -sf http://localhost:3000/health && echo \"\\n✅ Health check passed\" || echo \"\\n⚠️ Health check failed\""
            ]}' \
            --comment "Deploy BulmaBot ${{ github.sha }}" \
            --output text \
            --query 'Command.CommandId')
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

          sleep 20
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "::warning::SSM command finished with status: $STATUS"
          fi

  healthcheck:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013459781186:role/LumaBotGHActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Check application health
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.EC2_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "Checking http://$IP/health ..."
          curl -sf "http://$IP/health" && echo "✅ BulmaBot is healthy!" || echo "⚠️ Health check failed - check logs"
